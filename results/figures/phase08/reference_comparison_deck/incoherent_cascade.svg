<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img"><rect width="1200" height="800" fill="white"/><text x="70" y="80" font-family="Arial, DejaVu Sans, Helvetica, sans-serif" font-size="34" font-weight="700" text-anchor="start" fill="#111827">厚玻璃非相干级联</text><rect x="110" y="260" width="280" height="180" rx="16" fill="#dbeafe" stroke="#334155" stroke-width="3"/><text x="250" y="335" font-family="Arial, DejaVu Sans, Helvetica, sans-serif" font-size="28" font-weight="700" text-anchor="middle" fill="#111827">Front interface</text><text x="250" y="369" font-family="Arial, DejaVu Sans, Helvetica, sans-serif" font-size="28" font-weight="700" text-anchor="middle" fill="#111827">Air / Glass</text><text x="250" y="403" font-family="Arial, DejaVu Sans, Helvetica, sans-serif" font-size="28" font-weight="700" text-anchor="middle" fill="#111827">R_front</text><rect x="470" y="260" width="310" height="180" rx="16" fill="#fef3c7" stroke="#334155" stroke-width="3"/><text x="625" y="335" font-family="Arial, DejaVu Sans, Helvetica, sans-serif" font-size="28" font-weight="700" text-anchor="middle" fill="#111827">Rear coherent stack</text><text x="625" y="369" font-family="Arial, DejaVu Sans, Helvetica, sans-serif" font-size="28" font-weight="700" text-anchor="middle" fill="#111827">Glass / PVK / Air</text><text x="625" y="403" font-family="Arial, DejaVu Sans, Helvetica, sans-serif" font-size="28" font-weight="700" text-anchor="middle" fill="#111827">R_stack</text><rect x="860" y="260" width="240" height="180" rx="16" fill="#dcfce7" stroke="#334155" stroke-width="3"/><text x="980" y="335" font-family="Arial, DejaVu Sans, Helvetica, sans-serif" font-size="32" font-weight="700" text-anchor="middle" fill="#111827">R_total</text><line x1="390" y1="350" x2="460" y2="350" stroke="#334155" stroke-width="5"/><polygon points="460,350 442,338 442,362" fill="#334155"/><line x1="780" y1="350" x2="850" y2="350" stroke="#334155" stroke-width="5"/><polygon points="850,350 832,338 832,362" fill="#334155"/><text x="120" y="560" font-family="Arial, DejaVu Sans, Helvetica, sans-serif" font-size="24" font-weight="700" text-anchor="start" fill="#111827">R_total = R_front + (1-R_front)^2 R_stack / (1-R_front R_stack)</text></svg>